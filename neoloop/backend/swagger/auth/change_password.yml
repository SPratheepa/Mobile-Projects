tags:
  - Authentication

summary: Change Password

security:
  - Bearer: []

parameters:
  - in: body
    name: body
    required: true

    schema:
      type: object

      required:
        - current_password
        - new_password

      properties:

        current_password:
          type: string

        new_password:
          type: string
          example: Password@123

responses:

  200:
    description: Password changed successfully

  401:
    description: Unauthorized