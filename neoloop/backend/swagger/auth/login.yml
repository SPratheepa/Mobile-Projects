tags:
  - Authentication

summary: Login

parameters:
  - in: body
    name: body
    required: true

    schema:
      type: object

      required:
        - email
        - password

      properties:

        email:
          type: string
          example: test@test.com

        password:
          type: string
          example: Password@123

responses:

  200:
    description: Login successful

  400:
    description: Invalid credentials