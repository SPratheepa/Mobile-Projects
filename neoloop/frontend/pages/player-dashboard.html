<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>NeoLoop | Player Dashboard</title>

    <link
        rel="stylesheet"
        href="../css/dashboard.css">

</head>

<body>

    <div class="dashboard-container">

        <div class="top-bar">

            <div>

                <h1>Explore Rooms</h1>

                <p>
                    Discover escape rooms created by the NeoLoop community
                </p>

            </div>

            <div class="top-actions">

                <button
                    class="create-btn"
                    onclick="window.location.href='../index.html'">

                    Browse Rooms

                </button>

                <button
                    class="logout-btn"
                    onclick="logout()">

                    Logout

                </button>

            </div>

        </div>

        <div class="empty-state">

            <h2>
                🚀 Coming Soon
            </h2>

            <p>
                Public Room Browser, Room Discovery,
                Leaderboards, Favorites and Gameplay
                will be available in Sprint 3.
            </p>

        </div>

    </div>

    <script src="../js/auth.js"></script>

</body>

</html>
